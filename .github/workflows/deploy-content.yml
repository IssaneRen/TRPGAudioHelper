name: Deploy Static Content

on:
  push:
    branches: [master]
    paths:
      - 'public/blog/**'
      - 'public/wiki/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-static-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package static content
        run: tar -czf "trpg-helper-static-content-${{ github.sha }}.tar.gz" -C public blog wiki

      - name: Deploy static content archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "trpg-helper-static-content-${{ github.sha }}.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Extract static content archive
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -eu

            APP_CURRENT="/var/www/trpg-helper/current"
            ARCHIVE="/tmp/trpg-helper-static-content-${{ github.sha }}.tar.gz"

            if ! test -f "$ARCHIVE"; then
              echo "Static content archive is missing: $ARCHIVE" >&2
              exit 1
            fi

            if ! test -d "$APP_CURRENT"; then
              echo "Current release directory is missing: $APP_CURRENT" >&2
              exit 1
            fi

            tar -xzf "$ARCHIVE" -C "$APP_CURRENT"
            rm -f "$ARCHIVE"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Static content deployed - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "Files in /var/www/trpg-helper/current/blog/:"
            ls -la /var/www/trpg-helper/current/blog/
            echo "Files in /var/www/trpg-helper/current/wiki/:"
            ls -la /var/www/trpg-helper/current/wiki/
